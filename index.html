<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Inventor - Drag And Drop app maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comfortaa', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #181824;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #1f1f2e;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #2d2d44;
        }
        .brand {
            font-weight: bold;
            color: #4facfe;
        }
        .theme-toggle {
            font-size: 0.8rem;
            background: #2a2a3d;
            border: 1px solid #3d3d5c;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Left Panel Component Deck */
        .ide-sidebar {
            width: 280px;
            background-color: #14141f;
            border-right: 2px solid #2d2d44;
            display: flex;
            flex-direction: column;
        }
        .panel-section {
            padding: 15px;
            border-bottom: 1px solid #2d2d44;
            overflow-y: auto;
        }
        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8888aa;
            margin-bottom: 12px;
        }
        .component-deck {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .drag-item {
            background: #222232;
            border: 1px dashed #4facfe;
            padding: 12px;
            border-radius: 6px;
            cursor: grab;
            font-size: 0.85rem;
            user-select: none;
            transition: background 0.2s;
        }
        .drag-item:hover { background: #2b2b42; }

        .action-deck {
            margin-top: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #11111a;
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-clear { background: #2c2c35; color: #ef4444; border: 1px solid #ef4444; }
        .btn-publish { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #111; }

        /* Full Screen Staging Canvas Workspace (Takes full remaining width now) */
        .preview-space {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b0b11;
        }
        .drop-target-container {
            flex: 1;
            margin: 20px;
            background: #ffffff;
            color: #333333;
            border-radius: 6px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app-window-body {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* Editable Component wrappers */
        .site-block-wrapper {
            position: relative;
            padding: 12px;
            border: 1px transparent solid;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .site-block-wrapper:hover {
            border: 1px dashed #4facfe;
            background-color: rgba(79, 172, 254, 0.02);
        }
        .component-settings-bar {
            display: none;
            position: absolute;
            top: -34px;
            right: 10px;
            background: #1f1f2e;
            border: 1px solid #4facfe;
            padding: 4px 10px;
            border-radius: 4px;
            gap: 10px;
            z-index: 10;
        }
        .site-block-wrapper:hover .component-settings-bar { display: flex; align-items: center; }
        .setting-input { background: #0d0d14; border: 1px solid #3d3d5c; color: white; font-size: 0.75rem; padding: 4px; border-radius: 4px; width: 130px; outline: none; }
        .btn-delete-block { background: none; border: none; color: #ff5555; cursor: pointer; font-weight: bold; }
        .editable-element { outline: none; }
        .editable-element:focus { border-bottom: 2px solid #00f2fe !important; }
        .preview-img-box { max-width: 100%; max-height: 220px; border-radius: 6px; object-fit: cover; display: block; }
        .preview-video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 6px; background: #000; }
        .preview-video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .preview-nav-bar { display: flex; gap: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .preview-card-box { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">Nexus Inventor - Drag And Drop app maker</div>
        <button class="theme-toggle" id="themeToggleBtn">Theme: Dark Mode</button>
    </header>

    <div class="workspace">
        <div class="ide-sidebar">
            <div class="panel-section" style="flex: 1;">
                <div class="panel-title">Layout Element Modules</div>
                <div class="component-deck">
                    <div class="drag-item" draggable="true" data-type="header">Banner Header Title</div>
                    <div class="drag-item" draggable="true" data-type="paragraph">Editable Text Section</div>
                    <div class="drag-item" draggable="true" data-type="button
