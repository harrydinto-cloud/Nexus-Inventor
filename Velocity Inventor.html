<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Inventor - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comfortaa', sans-serif;
        }

        body {
            background-color: #00aaff;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* Vector lines overlaying the background layout */
        .line-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            color: #000000;
            user-select: none;
            letter-spacing: -1.5px;
        }

        .btn-start {
            display: inline-block;
            background-color: #0066ff;
            color: #000000;
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 400;
            padding: 10px 40px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }

        .btn-start:hover {
            background-color: #0044cc;
            color: #ffffff;
        }

        .btn-start:active {
            transform: scale(0.97);
        }

        /* Page Exit Animation Trigger Styles */
        body.page-exit {
            opacity: 0;
        }
        
        body.page-exit .container {
            transform: scale(0.9);
            opacity: 0;
        }

        body.page-exit .line-overlay {
            transform: scale(1.1) rotate(1deg);
        }
    </style>
</head>
<body>

    <svg class="line-overlay" id="bgLines" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="none">
        <path d="M 0,50 L 400,350 L 700,200 L 1000,500" fill="none" stroke="#6633cc" stroke-width="7" stroke-linecap="round"/>
        <path d="M 100,500 L 500,250 L 900,450" fill="none" stroke="#6633cc" stroke-width="6" stroke-linecap="round"/>
    </svg>

    <div class="container">
        <h1>Velocity Inventor</h1>
        <a href="#" class="btn-start" id="startLink">start building</a>
    </div>

    <script>
        document.getElementById('startLink').addEventListener('click', function(e) {
            e.preventDefault(); // Pause the link jumping instantly
            
            // Fire transition effects
            document.body.classList.add('page-exit');
            
            // Redirect using the exact HTML URL encoding name 
            setTimeout(function() {
                window.location.href = "Velocity%20Inventor.html";
            }, 500); 
        });
    </script>

</body>
</html>
